<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الانتقال إلى تليجرام</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f7f9; }
        .card { text-align: center; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #0088cc; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background-color: #006699; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>جاري تحويلك للقناة...</h2>
    <div class="loader"></div>
    <p>إذا لم يتم فتح التطبيق تلقائياً، اضغط على الزر أدناه:</p>
    <a href="tg://join?invite=Wa-1f4HaJkFiMTA0" id="tg-link" class="btn">فتح تليجرام الآن</a>
</div>

<script>
    // الرابط ببروتوكول tg للفتح المباشر داخل التطبيق
    const protocolLink = "tg://join?invite=Wa-1f4HaJkFiMTA0";
    // الرابط الاحتياطي للويب
    const webLink = "https://t.me/+Wa-1f4HaJkFiMTA0";

    // محاولة فتح التطبيق تلقائياً
    window.location.href = protocolLink;

    // في حال فشل البروتوكول أو كان المستخدم على متصفح لا يدعمه، يتم تحويله للرابط العادي بعد ثانيتين
    setTimeout(function() {
        if (document.hasFocus()) {
            console.log("التطبيق لم يفتح، البقاء في الصفحة للتحويل اليدوي.");
        }
    }, 2500);
</script>

</body>
</html>
